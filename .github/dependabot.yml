version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    groups:
      patch-and-minor:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
    groups:
      actions:
        patterns:
          - '*'