# git-cliff configuration for TIKTON Portal.
# Conventional Commits → grouped changelog.
# https://git-cliff.org/

[changelog]
header = """
# Changelog\n
All notable changes to **TIKTON Portal** are documented here.\n
"""
body = """
{% if version %}\
## [{{ version }}](https://github.com/{{ github.repository }}/tree/{{ version }}) — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits | sort(attribute="message") %}
- {% if commit.breaking %}[**breaking**]{% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }}){% if commit.breaking %}\
  {% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# commit_parsers: each parser is an array-of-tables (one [[commit_parsers]] block).
# Inline-table shorthand `{ ... }` is only valid inside an array; here we declare
# each parser as its own [[commit_parsers]] table so git-cliff v2.x accepts it.
[[commit_parsers]]
message = "^feat"
group = "Features"

[[commit_parsers]]
message = "^fix"
group = "Bug Fixes"

[[commit_parsers]]
message = "^perf"
group = "Performance"

[[commit_parsers]]
message = "^refactor"
group = "Refactor"

[[commit_parsers]]
message = "^docs"
group = "Documentation"

[[commit_parsers]]
message = "^test"
group = "Tests"

[[commit_parsers]]
message = "^build"
group = "Build System"

[[commit_parsers]]
message = "^ci"
group = "CI"

[[commit_parsers]]
message = "^chore"
group = "Chores"

[[commit_parsers]]
message = "^style"
group = "Styling"

[[commit_parsers]]
message = "^revert"
group = "Reverts"

# Skip dependency / merge commits
[[commit_parsers]]
message = "^Merge"
skip = true

[[commit_parsers]]
message = "^(deps|build)\\("
skip = true

# Mark breaking changes (conventional `!` marker or footer)
[[commit_parsers]]
message = "^.*!:"
body = "BREAKING CHANGE"
group = "Breaking Changes"